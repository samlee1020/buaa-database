{% extends "base.html" %}

{% block title %}门诊管理系统 - 患者信息查询{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #667eea; margin-bottom: 2rem; text-align: center;">患者信息查询</h2>
    
    <div class="card">
        <h3>查询条件</h3>
        <form method="POST" action="{{ url_for('patient_query') }}">
            <div class="form-group">
                <label for="query_type">查询类型：</label>
                <select class="form-control" id="query_type" name="query_type" required>
                    <option value="">请选择查询类型</option>
                    <option value="patient_id">病历号</option>
                    <option value="name">姓名</option>
                    <option value="phone_number">手机号</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="query_key">查询关键词：</label>
                <input type="text" class="form-control" id="query_key" name="query_key" 
                       placeholder="请输入查询关键词" required>
            </div>
            
            <div style="text-align: center; margin-top: 2rem;">
                <button type="submit" class="btn">查询</button>
                <a href="{{ url_for('patient_home') }}" class="btn btn-secondary" style="margin-left: 1rem;">返回</a>
            </div>
        </form>
    </div>
    
    <div class="card" style="margin-top: 2rem;">
        <h3>查询说明</h3>
        <ul style="list-style: none; padding-left: 0;">
            <li>📋 <strong>按病历号查询</strong>：输入完整的病历号进行精确查询</li>
            <li>👤 <strong>按姓名查询</strong>：输入姓名（支持模糊查询）</li>
            <li>📱 <strong>按手机号查询</strong>：输入手机号（支持模糊查询）</li>
        </ul>
        <p style="color: #666; margin-top: 1rem;">
            <small>提示：如果不输入查询条件，将显示所有患者信息</small>
        </p>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}门诊管理系统 - 患者登录{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2 style="color: #667eea; margin-bottom: 2rem; text-align: center;">患者登录</h2>
    
    <div class="card">
        <form method="POST" action="{{ url_for('patient_login') }}">
            <div class="form-group">
                <label for="patient_id">病历号：</label>
                <input type="number" class="form-control" id="patient_id" name="patient_id" 
                       placeholder="请输入您的病历号" required>
            </div>
            
            <div style="text-align: center; margin-top: 2rem;">
                <button type="submit" class="btn">登录</button>
                <a href="{{ url_for('patient_home') }}" class="btn btn-secondary" style="margin-left: 1rem;">返回</a>
            </div>
        </form>
    </div>
    
    <div class="card" style="margin-top: 2rem;">
        <h3>登录说明</h3>
        <ul style="list-style: none; padding-left: 0;">
            <li>🔢 <strong>病历号</strong>是您注册时系统生成的唯一标识</li>
            <li>❓ <strong>忘记病历号？</strong>请使用<a href="{{ url_for('patient_query') }}">信息查询</a>功能找回</li>
            <li>📝 <strong>新患者？</strong>请先<a href="{{ url_for('patient_register') }}">注册账号</a></li>
            <li>✅ <strong>登录后</strong>可以使用挂号、缴费等完整功能</li>
        </ul>
    </div>
</div>
{% endblock %}
